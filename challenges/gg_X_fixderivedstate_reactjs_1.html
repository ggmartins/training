<!DOCTYPE html>
<html>
<body>
  <div id="root"></div>
</body>
<!-- This setup is not suitable for production. -->
<!-- Only use it in development! -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react?dev",
    "react-dom/client": "https://esm.sh/react-dom/client?dev",
    "@tanstack/react-query": "https://esm.sh/@tanstack/react-query?dev"
  }
}
</script>
<script type="text/babel" data-type="module" data-presets="react,typescript">
import React, { StrictMode } from 'react';
import { createRoot } from 'react-dom/client';
import { QueryClient, QueryClientProvider, useQuery } from '@tanstack/react-query';

interface Repo {
   id: number;
   name: string;
   description: string | null;
}

let App = function MyApp() {
  const [search, setSearch] = React.useState("");

  const { data: repos = [], isLoading, error } = useQuery({
    queryKey: ['repos'],
    queryFn: async () => {
      const response = await fetch('https://api.github.com/users/ggmartins/repos');

      if (!response.ok) {
        throw new Error('Failed to fetch repositories');
      }

      return response.json();
    }
  });

  console.log("Rendering...");

  return (
    <div>
      <h1>Fix Derived States</h1>
      <input name="Search"
             type="text"
             placeholder="Search"
             value={search}
             onChange={(e: React.ChangeEvent<HTMLInputElement>) => setSearch(e.target.value)}/>
      {isLoading && <p>Loading repositories...</p>}
      {error && <p>{error instanceof Error ? error.message : 'Failed to fetch repositories'}</p>}
      <ul>
        {repos.map((repo: Repo) => (
          <li key={repo.id}>
            <strong>{repo.name}</strong>
            {repo.description && <span> - {repo.description}</span>}
          </li>
        ))}
      </ul>
    </div>
  );
}

const queryClient = new QueryClient();

const rootElement = document.getElementById('root');

if (!rootElement) {
  throw new Error('Root element not found');
}

const root = createRoot(rootElement);
root.render(
  <StrictMode>
    <QueryClientProvider client={queryClient}>
      <App />
    </QueryClientProvider>
  </StrictMode>
);
</script>
